<!DOCTYPE html>
<html>
<head>
  <title>DevOps Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      background: #020617;
      display: flex;
      justify-content: space-between;
    }

    .status {
      color: #22c55e;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.5; }
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 10px;
      border-radius: 10px;
      display: inline-block;
      width: 250px;
      vertical-align: top;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .logs {
      background: black;
      padding: 10px;
      height: 150px;
      overflow: auto;
      font-family: monospace;
      color: #22c55e;
    }
  </style>
</head>

<body>

<header>
  <h2>Afrizal DevOps Dashboard 🚀</h2>
  <div class="status">● LIVE</div>
</header>

<div class="container">

  <div class="card">
    <h3>🚀 Kubernetes</h3>
    <p>Cluster Running</p>
  </div>

  <div class="card">
    <h3>🐳 Docker</h3>
    <p>Image Deployed</p>
  </div>

  <div class="card">
    <h3>⚖️ HAProxy</h3>
    <p>Load Balancing Active</p>
  </div>

  <div class="card">
    <h3>🌐 Ingress</h3>
    <p>Routing OK</p>
  </div>

  <h3>📊 Activity Logs</h3>
  <div class="logs" id="logs"></div>

</div>

<script>
  const logs = document.getElementById("logs");

  setInterval(() => {
    const time = new Date().toLocaleTimeString();
    logs.innerHTML += `[${time}] Deployment running...\n`;
    logs.scrollTop = logs.scrollHeight;
  }, 1000);
</script>

</body>
</html>
